name: BowlCapture
options:
  bundleIdPrefix: com.wellbowled
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  BowlCapture:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wellbowled.BowlCapture
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSCameraUsageDescription: "BowlCapture needs camera access to record bowling deliveries at high frame rate for speed analysis."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleLightContent"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: true
